name: CI Demo

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      member:
        description: "Trigger member"
        required: true
        type: choice
        options:
          - CTS-23373
          - kurrna
          - morty80085
          - Noel261
          - REROSAMA
          - wangsu2006
          - xx6677-c

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: devops_demo
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      RUN_CI_MYSQL_TEST: true
      SPRING_PROFILES_ACTIVE: ci

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysql -h127.0.0.1 -P3306 -uroot -p123456 -e "SELECT 1" devops_demo; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B clean test

      - name: Build jar
        run: |
          ./mvnw -B -DskipTests package

