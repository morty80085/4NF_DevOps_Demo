name: CI/CD Demo

on:
  pull_request:
    branches: [ "master" ]
  push:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      member:
        description: "Select your member slot (replace labels with real GitHub IDs if needed)"
        required: true
        type: choice
        options:
          - CTS-23373
          - kurrna
          - morty80085
          - Noel261
          - REROSAMA
          - wangsu2006
          - xx6677-c

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: devops_demo
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      RUN_CI_MYSQL_TEST: true
      SPRING_PROFILES_ACTIVE: ci

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Print trigger info
        run: |
          echo "GitHub actor: ${{ github.actor }}"
          echo "Member slot input: ${{ github.event.inputs.member || 'N/A (push or pull_request)' }}"

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysql -h127.0.0.1 -P3306 -uroot -p123456 -e "SELECT 1" devops_demo; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B clean test

      - name: Build jar
        run: ./mvnw -B -DskipTests package

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          if-no-files-found: error

  cd-smoke-test:
    if: github.event_name != 'pull_request'
    needs: ci
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: devops_demo
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      SPRING_PROFILES_ACTIVE: ci

    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: dist

      - name: Select runnable jar
        run: |
          APP_JAR=$(find dist -name "*.jar" | grep -v "original" | head -n 1)
          if [ -z "$APP_JAR" ]; then
            echo "No runnable jar found"
            exit 1
          fi
          echo "APP_JAR=$APP_JAR" >> $GITHUB_ENV

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysql -h127.0.0.1 -P3306 -uroot -p123456 -e "SELECT 1" devops_demo; then
              echo "MySQL is ready"
              exit 0
            fi
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Start app
        run: |
          java -jar "$APP_JAR" > app.log 2>&1 &
          echo $! > app.pid

      - name: Health and API smoke test
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8080/actuator/health > /dev/null; then
              break
            fi
            sleep 2
          done
          curl -fsS http://127.0.0.1:8080/actuator/health
          curl -fsS -X POST http://127.0.0.1:8080/api/tasks \
            -H "Content-Type: application/json" \
            -d '{"title":"cd smoke"}'
          curl -fsS http://127.0.0.1:8080/api/tasks

      - name: Stop app and print logs
        if: always()
        run: |
          if [ -f app.pid ]; then kill $(cat app.pid) || true; fi
          echo "----- app.log -----"
          cat app.log || true

  deploy:
    if: github.event_name != 'pull_request'
    needs: cd-smoke-test
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}

    steps:
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: dist

      - name: Prepare deployment jar
        run: |
          APP_JAR=$(find dist -name "*.jar" | grep -v "original" | head -n 1)
          if [ -z "$APP_JAR" ]; then
            echo "No runnable jar found"
            exit 1
          fi
          cp "$APP_JAR" dist/app.jar

      - name: Upload jar to Tencent Cloud server
        if: ${{ env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_PASSWORD != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          source: "dist/app.jar"
          target: "~/apps/devops-demo"

      - name: Restart service on Tencent Cloud server
        if: ${{ env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_PASSWORD != '' }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          script: |
            mkdir -p ~/apps/devops-demo
            cd ~/apps/devops-demo
            if [ -f app.pid ] && kill -0 "$(cat app.pid)" 2>/dev/null; then
              kill "$(cat app.pid)" || true
              sleep 2
            fi
            nohup java -jar app.jar > app.log 2>&1 &
            echo $! > app.pid
            sleep 5
            ps -p "$(cat app.pid)" -f || true

      - name: Deploy skipped reminder
        if: ${{ !(env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_PASSWORD != '') }}
        run: |
          echo "SERVER_HOST / SERVER_USER / SERVER_PASSWORD 未配置，已跳过自动部署。"

