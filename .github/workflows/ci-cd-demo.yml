name: CI/CD Demo

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      member:
        description: "Select your member slot (replace labels with real GitHub IDs if needed)"
        required: true
        type: choice
        options:
          - member-1
          - member-2
          - member-3
          - member-4
          - member-5
          - member-6
          - member-7

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.4
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: devops_demo
          MYSQL_USER: root
          MYSQL_PASSWORD: 123456
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u$MYSQL_USER -p$MYSQL_PASSWORD"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      RUN_CI_MYSQL_TEST: true

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Print trigger info
        run: |
          echo "GitHub actor: ${{ github.actor }}"
          echo "Member slot input: ${{ github.event.inputs.member || 'N/A (push or pull_request)' }}"

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysql -h127.0.0.1 -P3306 -uroot -p123456 -e "SELECT 1" devops_demo; then
              echo "MySQL is ready"
              exit 0
            fi
            echo "Waiting for MySQL..."
            sleep 2
          done
          echo "MySQL did not become ready in time"
          exit 1

      - name: Run tests
        run: |
          chmod +x mvnw
          ./mvnw -B clean test

      - name: Build jar
        run: ./mvnw -B -DskipTests package

